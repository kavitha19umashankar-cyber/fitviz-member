workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # FitViz — App Store release
  # ─────────────────────────────────────────────────────────────────────────────
  fitviz-ios-release:
    name: FitViz iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials

    scripts:
      - name: Set up code signing manually
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/fitviz.mobileprovision
          keychain initialize
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          xcode-project use-profiles --profile /tmp/fitviz.mobileprovision

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA (FitViz)
        script: |
          flutter build ipa \
            --flavor fitviz \
            --target lib/flavors/main_fitviz.dart \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  # ─────────────────────────────────────────────────────────────────────────────
  # K2 Fitness — App Store release
