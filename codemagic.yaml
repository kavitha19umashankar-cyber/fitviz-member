workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # FitViz — App Store release
  # ─────────────────────────────────────────────────────────────────────────────
  fitviz-ios-release:
    name: FitViz iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      integrations:
        app_store_connect: fitviz_connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: in.fitviz.member

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA (FitViz)
        script: |
          flutter build ipa \
            --flavor fitviz \
            --target lib/flavors/main_fitviz.dart \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

