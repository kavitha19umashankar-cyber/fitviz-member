workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # FitViz — App Store release
  # ─────────────────────────────────────────────────────────────────────────────
  fitviz-ios-release:
    name: FitViz iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: in.fitviz.member
      vars:
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)   # replace after adding key in Codemagic
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)
        CERTIFICATE_PRIVATE_KEY: Encrypted(...)

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA (FitViz)
        script: |
          flutter build ipa \
            --flavor fitviz \
            --target lib/flavors/main_fitviz.dart \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # set to true when ready for App Store review

  # ─────────────────────────────────────────────────────────────────────────────
