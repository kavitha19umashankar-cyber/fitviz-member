workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # FitViz — Play Store AAB release
  # ─────────────────────────────────────────────────────────────────────────────
  fitviz-android-release:
    name: FitViz Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      groups:
        - android_credentials

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Write google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON_FITVIZ | base64 --decode \
            > android/app/google-services.json

      - name: Set up keystore
        script: |
          echo $FITVIZ_KEYSTORE | base64 --decode > android/fitviz-keystore.jks
          cat > android/key.properties << EOF
          keyAlias=$FITVIZ_KEY_ALIAS
          keyPassword=$FITVIZ_KEY_PASSWORD
          storeFile=fitviz-keystore.jks
          storePassword=$FITVIZ_STORE_PASSWORD
          EOF

      - name: Build Android AAB (FitViz)
        script: |
          flutter build appbundle \
            --flavor fitviz \
            --target lib/flavors/main_fitviz.dart \
            --release \
            --build-number=23

    artifacts:
      - build/app/outputs/bundle/fitvizRelease/app-fitviz-release.aab
      - build/app/outputs/mapping/fitvizRelease/mapping.txt

    publishing:
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_JSON
        track: internal
        submit_as_draft: true

  # ─────────────────────────────────────────────────────────────────────────────
  # FitViz — App Store release
  # ─────────────────────────────────────────────────────────────────────────────
  fitviz-ios-release:
    name: FitViz iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials

    scripts:
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      - name: Set up code signing
        script: |
          # Decode certificate and provisioning profile
          echo $CM_CERTIFICATE | base64 --decode > /tmp/distribution.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/fitviz.mobileprovision

          # Add certificate to keychain
          keychain initialize
          keychain add-certificates \
            --certificate /tmp/distribution.p12 \
            --certificate-password $CM_CERTIFICATE_PASSWORD

          # Install provisioning profile (Xcode requires UUID as filename)
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          PROFILE_UUID=$(security cms -D -i /tmp/fitviz.mobileprovision | \
            python3 -c "import sys, plistlib; p = plistlib.loads(sys.stdin.buffer.read()); print(p['UUID'])")
          PROFILE_NAME=$(security cms -D -i /tmp/fitviz.mobileprovision | \
            python3 -c "import sys, plistlib; p = plistlib.loads(sys.stdin.buffer.read()); print(p['Name'])")

          cp /tmp/fitviz.mobileprovision "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

          # Stamp the profile specifier into the Xcode project
          sed -i '' \
            "s/FITVIZ_PROFILE_PLACEHOLDER/$PROFILE_NAME/g" \
            ios/Runner.xcodeproj/project.pbxproj

          # Generate export options plist with actual profile name
          cat > /tmp/ExportOptions-fitviz.plist << EXPORT_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>745AM7ANGG</string>
              <key>uploadBitcode</key>
              <false/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>in.fitviz.member</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          EXPORT_EOF
          echo "Export options generated for profile: $PROFILE_NAME"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Write GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST_FITVIZ | base64 --decode > ios/Runner/GoogleService-Info.plist
          echo "GoogleService-Info.plist written"

      - name: Patch firebase_messaging for modular header compatibility
        script: |
          PLUGIN_H=$(find "$HOME/.pub-cache/hosted/pub.dev" \
            -path "*/firebase_messaging-*/ios/Classes/FLTFirebaseMessagingPlugin.h" | head -1)
          if [ -n "$PLUGIN_H" ]; then
            sed -i '' \
              's|#import <Firebase/Firebase.h>|@import FirebaseCore;\n@import FirebaseMessaging;|g' \
              "$PLUGIN_H"
            echo "Patched: $PLUGIN_H"
          else
            echo "Warning: FLTFirebaseMessagingPlugin.h not found"
          fi

      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;

      - name: Set FitViz app icon
        script: |
          cp -r ios/Runner/Assets.xcassets/AppIcon-fitviz.appiconset/. ios/Runner/Assets.xcassets/AppIcon.appiconset/

      - name: Build iOS IPA (FitViz)
        script: |
          flutter build ipa \
            --flavor fitviz \
            --target lib/flavors/main_fitviz.dart \
            --release \
            --build-number=25 \
            --export-options-plist=/tmp/ExportOptions-fitviz.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

