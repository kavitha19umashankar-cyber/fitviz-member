name: fitviz_member
description: FitViz Member App — gym member portal for workouts, attendance, classes & payments.
publish_to: 'none'
version: 1.1.0+12

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.2.0

  # Secure token storage (Android Keystore / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Non-sensitive local preferences
  shared_preferences: ^2.2.3

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  google_fonts: ^6.2.1

  # Push Notifications (FCM)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  # Payments
  razorpay_flutter: ^1.3.7

  # Network state
  connectivity_plus: ^6.0.3

  # Image compression before upload
  flutter_image_compress: ^2.2.0

  # Biometric authentication
  local_auth: ^2.3.0

  # App version info
  package_info_plus: ^8.0.0

  # Freeze data classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  flutter_lints: ^3.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fitviz/images/
    - assets/fitviz/icons/
    - assets/k2fitness/images/
    - assets/k2fitness/icons/

  # Fonts loaded via google_fonts package at runtime
